<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명규의 생일선물은?!</title>
    <style>
        :root {
            --primary-color: #ff758c;
            --secondary-color: #ff7eb3;
            --bg-color: #fef6f8;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 애플 기본 폰트 스타일 시스템 적용 */
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #f0efff 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            height: 80vh;
            min-height: 550px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.15);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 공통 버튼 스타일 */
        .btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: all 0.2s ease;
            margin-top: 30px;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 117, 140, 0.4);
        }

        /* 1페이지 스타일 */
        .emoticon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #ff5e7e;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff758c;
            margin-bottom: 10px;
        }

        /* 2페이지 스타일 */
        .welcome-text {
            font-size: 1.15rem;
            line-height: 1.6;
            word-break: keep-all;
        }
        .highlight {
            color: #ff5e7e;
            font-weight: bold;
        }

        /* 3페이지 룰렛 스타일 */
        .roulette-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-top: 20px;
        }

        /* 룰렛 화살표 */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff3366;
            z-index: 10;
        }

        .canvas-wrap {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #fff, 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            /* 베지에 곡선을 수정하여 막판에 아주 천천히 스르륵 멈추도록 조정 (7.5초 연출) */
            transition: transform 7.5s cubic-bezier(0.1, 0.9, 0.15, 1);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 4페이지 결과 스타일 */
        .result-emoticon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .gift-box {
            background: #fff0f3;
            border: 3px dashed #ff758c;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d90429;
            margin: 20px 0;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="page1" class="page active">
            <div class="emoticon">🎁✨</div>
            <h1>명규의 생일선물은 ?!</h1>
            <button class="btn" onclick="nextPage(2)">Start !</button>
        </div>

        <div id="page2" class="page">
            <div class="emoticon" style="font-size: 3.5rem;">🎉🕺🏻</div>
            <p class="welcome-text">
                환영합니다!<br>지금부터 <span class="highlight">명규의 생일선물 추첨</span>을 시작합니다.<br><br>
                명규오빠의 선물은 다음의 후보 중 랜덤으로 결정됩니다!
            </p>
            <button class="btn" onclick="nextPage(3)">다음으로</button>
        </div>

        <div id="page3" class="page">
            <h2 id="roulette-title">두근두근 룰렛!</h2>
            <div class="roulette-container">
                <div class="arrow"></div>
                <div class="canvas-wrap" id="canvas-wrap">
                    <canvas id="rouletteCanvas" width="300" height="300"></canvas>
                </div>
            </div>
            <button class="btn" id="spin-btn" onclick="spinRoulette()">돌리기</button>
        </div>

        <div id="page4" class="page">
            <div class="result-emoticon">🥳🎉👏</div>
            <h2 style="font-size: 1.8rem; margin-bottom: 10px;">축하합니다!!</h2>
            <p>명규오빠에게 딱 어울리는 선물 🎁</p>
            <div class="gift-box">👞 버켄스탁 👞</div>
            <p class="welcome-text" style="font-size: 1.1rem; margin-top: 10px;">선물이 마음에 드시나요? 🥰</p>
        </div>
    </div>

    <script>
        function nextPage(pageIndex) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`page${pageIndex}`).classList.add('active');
            
            if(pageIndex === 3) {
                setTimeout(drawRoulette, 100);
            }
        }

        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        
        // 순서 고정 (아디다스 12시, 버켄스탁 4시 방향)
        const candidates = ['아디다스', '크록스', '버켄스탁', '다이소', '채은이가 다시 뽑기'];
        const colors = ['#ffd6a5', '#9bf6ff', '#ffadad', '#caffbf', '#ffc6ff'];
        
        function drawRoulette() {
            const numSegments = candidates.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * anglePerSegment - Math.PI / 2 - (anglePerSegment / 2);
                const endAngle = startAngle + anglePerSegment;

                // 부채꼴 그리기
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // 텍스트 회전 방식 정렬 및 글꼴 깔끔하게 세팅
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#4a4a4a';
                ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif';
                
                ctx.fillText(candidates[i], radius - 20, 0);
                ctx.restore();
            }
        }

        let isSpinning = false;
        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spin-btn');
            const title = document.getElementById('roulette-title');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            title.innerText = "두구두구두구두구...";

            const wrap = document.getElementById('canvas-wrap');
            
            const totalSegments = 5;
            const targetSegmentIndex = 2; // 버켄스탁 인덱스
            
            // 기존 정중앙 멈춤 공식: 360 - (360 / 5 * 2) = 288도
            // 한 칸의 각도는 72도이며, 버켄스탁 칸의 3/4(75%) 지점에 멈추기 위해 수학적 오프셋 적용
            // 중앙(50%)에서 오른쪽 경계선 쪽으로 25%만큼 더 회전하도록 세밀하게 각도를 비틀었습니다.
            const segmentAngle = 360 / totalSegments; 
            const centerAngle = 360 - (segmentAngle * targetSegmentIndex);
            const offsetAngle = segmentAngle * 0.25; // 3/4 지점 안착을 위한 미세 조정값
            const baseAngle = centerAngle + offsetAngle;
            
            // 회전 바퀴 수 대폭 추가 (마구 돌다 천천히 정지)
            const extraSpins = (16 + Math.floor(Math.random() * 4)) * 360; 
            const finalRotation = extraSpins + baseAngle;

            wrap.style.transform = `rotate(${finalRotation}deg)`;

            // 천천히 감속하는 시간과 맞추기 위해 대기 시간을 7.7초로 연장
            setTimeout(() => {
                nextPage(4);
            }, 7700); 
        }
    </script>
</body>
</html>
