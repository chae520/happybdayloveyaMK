<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명규의 생일선물은?!</title>
    <!-- 구글 폰트 적용 (귀여운 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff758c;
            --secondary-color: #ff7eb3;
            --bg-color: #fef6f8;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Gowun Dodum', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #f0efff 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            height: 80vh;
            min-height: 550px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.15);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 공통 버튼 스타일 */
        .btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: all 0.2s ease;
            margin-top: 30px;
            font-family: 'Gamja Flower', cursive;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 117, 140, 0.4);
        }

        /* 1페이지 스타일 */
        .emoticon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-family: 'Gamja Flower', cursive;
            font-size: 2.3rem;
            color: #ff5e7e;
            line-height: 1.4;
        }

        /* 2페이지 스타일 */
        .welcome-text {
            font-size: 1.2rem;
            line-height: 1.6;
            word-break: keep-all;
        }
        .highlight {
            color: #ff5e7e;
            font-weight: bold;
        }

        /* 3페이지 룰렛 스타일 */
        .roulette-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-top: 20px;
        }

        /* 룰렛 화살표 */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff3366;
            z-index: 10;
        }

        .canvas-wrap {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #fff, 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            /* 7초 동안 박진감 넘치게 회전 */
            transition: transform 7s cubic-bezier(0.15, 0.85, 0.2, 1);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 4페이지 결과 스타일 */
        .result-emoticon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .gift-box {
            background: #fff0f3;
            border: 3px dashed #ff758c;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d90429;
            margin: 20px 0;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1번 화면: 랜딩 페이지 -->
        <div id="page1" class="page active">
            <div class="emoticon">🎁✨</div>
            <h1>명규의 생일선물은 ?!</h1>
            <button class="btn" onclick="nextPage(2)">Start !</button>
        </div>

        <!-- 2번 화면: 안내 페이지 -->
        <div id="page2" class="page">
            <div class="emoticon" style="font-size: 3.5rem;">🎉🕺🏻</div>
            <p class="welcome-text">
                환영합니다!<br>지금부터 <span class="highlight">명규의 생일선물 추첨</span>을 시작합니다.<br><br>
                명규오빠의 선물은 다음의 후보 중 랜덤으로 결정됩니다!
            </p>
            <button class="btn" onclick="nextPage(3)">다음으로</button>
        </div>

        <!-- 3번 화면: 룰렛 페이지 -->
        <div id="page3" class="page">
            <h2 style="font-family: 'Gamja Flower'; font-size: 1.8rem; color:#ff758c; margin-bottom: 10px;" id="roulette-title">두근두근 룰렛!</h2>
            <div class="roulette-container">
                <div class="arrow"></div>
                <div class="canvas-wrap" id="canvas-wrap">
                    <canvas id="rouletteCanvas" width="300" height="300"></canvas>
                </div>
            </div>
            <button class="btn" id="spin-btn" onclick="spinRoulette()">돌리기</button>
        </div>

        <!-- 4번 화면: 결과 페이지 -->
        <div id="page4" class="page">
            <div class="result-emoticon">🥳🎉👏</div>
            <h2 style="font-family: 'Gamja Flower'; font-size: 2rem; margin-bottom: 10px;">축하합니다!!</h2>
            <p>명규오빠에게 딱 어울리는 선물 🎁</p>
            <div class="gift-box">👞 버켄스탁 👞</div>
            <p class="welcome-text" style="font-size: 1.1rem; margin-top: 10px;">선물이 마음에 드시나요? 🥰</p>
        </div>
    </div>

    <script>
        function nextPage(pageIndex) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`page${pageIndex}`).classList.add('active');
            
            if(pageIndex === 3) {
                setTimeout(drawRoulette, 100);
            }
        }

        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        
        // 원하셨던 순서대로 배치 (아디다스 12시, 버켄스탁 4시)
        const candidates = ['아디다스', '크록스', '버켄스탁', '다이소', '채은이가 다시 뽑기'];
        const colors = ['#ffd6a5', '#9bf6ff', '#ffadad', '#caffbf', '#ffc6ff'];
        
        function drawRoulette() {
            const numSegments = candidates.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                // 원래 원하셨던 칸 정중앙 회전 방식으로 롤렛 복구
                const startAngle = i * anglePerSegment - Math.PI / 2 - (anglePerSegment / 2);
                const endAngle = startAngle + anglePerSegment;

                // 부채꼴 색칠
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // 원래의 예뻤던 폰트 회전 렌더링 방식으로 롤백 (정중앙 정렬)
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#4a4a4a';
                ctx.font = 'bold 14px Gowun Dodum';
                
                // 이상한 undefined 유발 코드 삭제하고 텍스트 깔끔하게 한 줄 출력
                ctx.fillText(candidates[i], radius - 20, 0);
                ctx.restore();
            }
        }

        let isSpinning = false;
        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spin-btn');
            const title = document.getElementById('roulette-title');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            title.innerText = "두구두구두구두구...";

            const wrap = document.getElementById('canvas-wrap');
            
            // 현재 배열에서 '버켄스탁'은 2번째 인덱스입니다.
            // 멈췄을 때 12시 화살표가 '버켄스탁' 칸 정중앙을 찌르도록 각도 셋팅
            const totalSegments = 5;
            const targetSegmentIndex = 2; 
            
            const baseAngle = 360 - (360 / totalSegments) * targetSegmentIndex;
            const extraSpins = (14 + Math.floor(Math.random() * 4)) * 360; 
            const finalRotation = extraSpins + baseAngle;

            wrap.style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                nextPage(4);
            }, 7200); 
        }
    </script>
</body>
</html>
