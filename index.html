<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명규의 생일선물은?!</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<section id="page1" class="page active">
  <div class="emoji">🎁✨</div>
  <h1>명규의 생일선물은?!</h1>
  <button onclick="nextPage(2)">Start!</button>
</section>

<section id="page2" class="page">
  <h2>환영합니다! 🎉</h2>
  <p>지금부터 명규의 생일선물 추첨을 시작합니다</p>
  <p class="small">명규오빠의 선물은 다음의 후보 중 랜덤으로 결정됩니다</p>
  <button onclick="nextPage(3)">다음</button>
</section>

<section id="page3" class="page">
  <div class="pointer"></div>
  <div class="roulette" id="roulette">
    <div class="label l1">버켄스탁</div>
    <div class="label l2">크록스</div>
    <div class="label l3">아디다스</div>
    <div class="label l4">다이소</div>
    <div class="label l5">채은이가<br>다시 뽑기</div>
  </div>
  <button onclick="spin()">돌리기</button>
</section>

<section id="page4" class="page">
  <div class="emoji">🎉</div>
  <h1>축하합니다!</h1>
  <p>선물이 마음에 드시나요?</p>
  <h2>🎁 버켄스탁 🎁</h2>
</section>

</div>

<script>
function nextPage(num){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById("page"+num).classList.add("active");
}

let spinning=false;
function spin(){
 if(spinning) return;
 spinning=true;

 const roulette=document.getElementById("roulette");

 // 랜덤처럼 보이지만 항상 버켄스탁 결과
 const rotation = 360*6;
 roulette.style.transform=`rotate(${rotation}deg)`;

 setTimeout(()=>{
   nextPage(4);
 },4000);
}
</script>
</body>
</html>
